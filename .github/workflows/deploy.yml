name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deploys que podem conflitar
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ============================================
  # Job 1: Build & Deploy to GitHub Pages
  # ============================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================
  # Job 2: Lighthouse CI Audit
  # Roda em paralelo ao deploy para detectar
  # regressões de performance/accessibility.
  #
  # ============================================================
  # COMO CONFIGURAR O LHCI_GITHUB_APP_TOKEN
  # ============================================================
  # Para que o Lighthouse CI poste as pontuações de volta nos
  # Pull Requests, instale o "Lighthouse CI GitHub App":
  #
  #   1. Acesse https://github.com/apps/lighthouse-ci
  #   2. Clique em "Install" e selecione o repositório
  #      `mariliamezalheiradev/mariliamezalheiradev`
  #   3. Após a instalação, o GitHub cria automaticamente o
  #      secret `LHCI_GITHUB_APP_TOKEN` no repositório.
  #
  # Verifique em: Settings → Secrets and variables → Actions
  # Se o secret não aparecer automaticamente, gere um novo token
  # em https://github.com/settings/tokens com escopo `repo`.
  # ============================================================
  lighthouse:
    name: Lighthouse CI Audit
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for deployment
        run: sleep 30

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/404.html
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          # Falha o job se a pontuação cair abaixo dos thresholds
          # configurados em lighthouse-budget.json.
          #
          # IMPORTANTE: ajuste os thresholds em lighthouse-budget.json
          # após rodar o primeiro Lighthouse local para refletir o
          # peso real dos assets (veja README.md → "Lighthouse local").
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}